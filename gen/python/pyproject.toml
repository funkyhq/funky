# funky-protos — a thin, installable wrapper around the buf-generated stubs.
#
# The `funky/` package under this directory is generated by `buf generate` and
# is gitignored (the .proto files are the source of truth). This pyproject is
# committed so the generated tree can be imported as a normal dependency
# (`import funky.registry.v1...`) by every backend in the workspace, instead of
# leaning on PYTHONPATH. Run `buf generate` to produce the stubs; thanks to the
# path-based editable install below, it can run before or after `uv sync`.
[project]
name = "funky-protos"
version = "0.0.0"
description = "Generated Funky protobuf + ConnectRPC stubs."
requires-python = ">=3.10"
# The connectrpc runtime that the generated *_connect.py modules import; also
# pulls in protobuf transitively. Note the PyPI rename: this package was
# `connect-python` through 0.9.0, then became `connectrpc` at 0.10 (which is
# when `connectrpc.codec` became public, matching what current plugins import).
dependencies = [
  "connectrpc>=0.10.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["funky"]
# `funky/` is generated by `buf generate` and is gitignored, so it may not exist
# when this package is first installed. Hatchling's default editable install pins
# the packages it discovers *at build time*; if `funky/` is absent then, the
# install silently never exposes it — even after a later `buf generate`. Forcing
# the path-based editable mode (add this directory to sys.path) makes `funky`
# importable whenever the stubs exist at *import* time, so `uv sync` and
# `buf generate` can run in either order.
dev-mode-dirs = ["."]
