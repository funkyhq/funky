# Cloud Run continuous-deployment config, as generated by the Cloud Build
# trigger, with one fix: the Docker build context is the repository root (".")
# instead of client/gcp_python. buf generate reads buf.gen.yaml/buf.yaml/proto/ and
# the client resolves funky-protos from the uv workspace, all at the repo root —
# a package-directory context fails with "read buf.gen.yaml: file does not exist".
#
# This service needs the four backend URLs at deploy time. They are not set here
# (they differ per environment); set them on the service, e.g.:
#
#   gcloud run services update funky-client --region us-central1 \
#     --set-env-vars CONFIG_REGISTRY_URL=https://config-registry-xxxx.run.app,\
#   SESSION_STORE_URL=https://session-store-xxxx.run.app,\
#   SANDBOX_RUNTIME_URL=https://sandbox-runtime-xxxx.run.app,\
#   AGENT_SERVICE_URL=https://agent-service-xxxx.run.app
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--no-cache'
      - '-t'
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      # Build context = repository root (was client/gcp_python).
      - .
      - '-f'
      - client/gcp_python/Dockerfile
    id: Build
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
    id: Push
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - '--platform=managed'
      - >-
        --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
    id: Deploy
    entrypoint: gcloud
images:
  - >-
    $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _PLATFORM: managed
  _TRIGGER_ID: ''
  _SERVICE_NAME: funky-client
  _DEPLOY_REGION: us-central1
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_PROJECT_ID: funky-485504
tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - funky-client
