# uv workspace root. Not a package itself — it just ties the generated protobuf
# stubs (gen/python) and the service backends together so they share one
# virtualenv and resolve each other by path instead of via PyPI.
#
# Members are added here as new backends land.
[tool.uv.workspace]
members = [
  "gen/python",
  "config_registry/local_python_jsonl",
  "config_registry/gcp_python_postgres",
  "session_store/local_python_jsonl",
  "session_store/gcp_python_postgres",
  "sandbox_runtime/local_python_docker",
  "sandbox_runtime/gcp_python_modal",
  "agent_service/local_python_anthropic",
  "agent_service/gcp_python_openrouter",
  "client/gcp_python",
]

# The Modal SDK (sandbox_runtime/gcp_python_modal) declares a conservative
# `protobuf<7` cap, but the buf-generated stubs are 7.x gencode and need the 7.x
# runtime. protobuf is forward-compatible — modal's own 6.x gencode runs fine on
# the 7.x runtime (runtime >= gencode is the supported direction) — so override
# the cap to keep a single protobuf across the workspace rather than pinning the
# codegen plugins (and every other backend) down to 6.x.
[tool.uv]
override-dependencies = ["protobuf>=7.35.1"]

# Test tooling, shared across all backends. Installed by `uv sync`.
[dependency-groups]
dev = [
  "pytest>=8",
  # aiosqlite lets the Postgres backend's store run against an in-process SQLite
  # engine in tests — the ORM is engine-agnostic, so the wire path is exercised
  # without a live Cloud SQL instance (see session_store/gcp_python_postgres).
  "aiosqlite>=0.20",
]
